{% extends 'layout.html' %}

{% block title %}
{{ title }}
{% endblock %}

{% block content %}

<div class="container mt-3">

  <h1>{{ title }}</h1>
  <hr>

  <div class="row">

{% for ONEChampionship in ONEChampionships.items %}
<div class="col-lg-3 col-md-4 col-sm-6">

  <div class="card mt-4 card-ONEChampionship">

    <a href="{{ url_for('ONEChampionship.detail_ONEChampionship', id=ONEChampionship.id) }}">
      <img src="{{ ONEChampionship.image }}" class="card-img-top bg-secondary" alt="{{ ONEChampionship.name }}">
    </a>

    <div class="card-body">

      <h5 class="card-title">
        {{ ONEChampionship.name }}
      </h5>

      <p class="card-text">
        {{ ONEChampionship.country }}
      </p>

      <a href="{{ url_for('ONEChampionship.detail_ONEChampionship', id=ONEChampionship.id) }}" class="btn btn-outline-success btn-sm">
        View Detail
      </a>

    </div>

  </div>

</div>
{% endfor %}

  </div>

  <div class="mt-4">
    {% include 'core/pagination.html' %}
  </div>

</div>

{% endblock %}
