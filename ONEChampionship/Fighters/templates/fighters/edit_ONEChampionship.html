{% extends 'layout.html' %}

{% block title %}
{{ title }}
{% endblock %}

{% block content %}

<div class="container mt-4">

  <h1>Edit Fighter</h1>
  <hr>

  <form method="POST">

    <div class="row">

      <div class="col-md-6 mb-3">
        <label class="form-label">Fighter Name</label>
        <input type="text" name="name" class="form-control" value="{{ fighter.name }}" required>
      </div>

      <div class="col-md-3 mb-3">
        <label class="form-label">Age</label>
        <input type="number" name="age" class="form-control" value="{{ fighter.age }}" required>
      </div>

      <div class="col-md-3 mb-3">
        <label class="form-label">Height (cm)</label>
        <input type="text" name="height" class="form-control" value="{{ fighter.height }}">
      </div>

    </div>

    <div class="mb-3">
      <label class="form-label">Country</label>
      <input type="text" name="country" class="form-control" value="{{ fighter.country }}">
    </div>

    <div class="mb-3">
      <label class="form-label">Weight Class</label>
      <input type="text" name="weight_class" class="form-control" value="{{ fighter.weight_class }}">
    </div>

    <div class="mb-3">
      <label class="form-label">Gym</label>
      <input type="text" name="gym" class="form-control" value="{{ fighter.gym }}">
    </div>

    <div class="mb-3">
      <label class="form-label">Fighter Image URL</label>
      <input type="text" name="image" class="form-control" value="{{ fighter.image }}">
    </div>

    <div class="mb-3">
      <label class="form-label">Description</label>
      <textarea name="description" class="form-control" rows="4">{{ fighter.description }}</textarea>
    </div>

    <button class="btn btn-success">
      Update Fighter
    </button>

    <a href="{{ url_for('ONEChampionship.index') }}" class="btn btn-secondary">
      Back
    </a>

  </form>

</div>

{% endblock %}
