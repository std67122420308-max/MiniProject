{% extends 'layout.html' %}

{% block title %}
{{ title }}
{% endblock %}

{% block content %}

<div class="container mt-3 mb-3">

<h1>{{ title }}</h1>
<hr>

<div class="card mt-3">

<div class="card-header">
<h3>New Fighter Form</h3>
</div>

<div class="card-body">

<form method="post">

<div class="mb-3">
<label class="form-label">Fighter Name</label>
<input name="name" type="text" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Age</label>
<input name="age" type="number" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Country</label>
<input name="country" type="text" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Weight Class</label>
<input name="weight_class" type="text" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Fighter Image URL</label>
<input name="image" type="text" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Description</label>
<textarea name="description" class="form-control" rows="3"></textarea>
</div>

<div class="mb-3">
<label class="form-label">Gym</label>
<input name="gym" type="text" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Teams</label>
<select name="teams" class="form-select" multiple>
{% for team in teams %}
<option value="{{ team.id }}">{{ team.name }}</option>
{% endfor %}
</select>
</div>

<hr>

<button type="submit" class="btn btn-outline-secondary">
<i class="bi bi-file-earmark-plus"></i>
Add Fighter
</button>

</form>

</div>
</div>

</div>

{% endblock %}
