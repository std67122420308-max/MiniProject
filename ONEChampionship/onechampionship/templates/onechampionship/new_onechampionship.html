{% extends 'layout.html' %}

{% block title %}
{{ title }}
{% endblock %}

{% block content %}

<div class="container mt-4 mb-4">

  <h1>{{ title }}</h1>
  <hr>

  <div class="card shadow-sm mt-3">

    <div class="card-header">
      <h3>New Fighter Form</h3>
    </div>

    <div class="card-body">

      <form method="POST">

        <div class="row">

          <div class="col-md-6 mb-3">
            <label class="form-label">Fighter Name</label>
            <input name="name" type="text" class="form-control" required>
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label">Age</label>
            <input name="age" type="number" class="form-control" required>
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label">Country</label>
            <input name="country" type="text" class="form-control" required>
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label">Weight Class</label>
            <input name="weight_class" type="text" class="form-control" required>
          </div>

          <div class="col-12 mb-3">
            <label class="form-label">Fighter Image URL</label>
            <input name="image" type="text" class="form-control" placeholder="Paste image URL here" required>
          </div>

          <div class="col-12 mb-3">
            <label class="form-label">Gym</label>
            <input name="gym" type="text" class="form-control">
          </div>

          <div class="col-12 mb-3">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-control" rows="3"></textarea>
          </div>

          <div class="col-12 mb-3">
            <label class="form-label">Teams</label>
            <select name="teams" class="form-select" multiple>
              {% for team in teams %}
              <option value="{{ team.id }}">{{ team.name }}</option>
              {% endfor %}
            </select>
          </div>

        </div>

        <hr>

        <button type="submit" class="btn btn-outline-success">
          <i class="bi bi-plus-circle"></i>
          Add Fighter
        </button>

        <a href="{{ url_for('onechampionship.index') }}" class="btn btn-outline-secondary">
          Back
        </a>

      </form>

    </div>
  </div>

</div>

{% endblock %}
