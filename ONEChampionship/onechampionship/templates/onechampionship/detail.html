{% extends "layout.html" %}

{% block title %}
{{ title }}
{% endblock %}

{% block content %}

<div class="container mt-4">

  <h1>{{ fighter.name }}</h1>
  <hr>

  <img src="{{ fighter.image }}" class="img-fluid mb-3">

  <p><b>Age:</b> {{ fighter.age }}</p>
  <p><b>Country:</b> {{ fighter.country }}</p>
  <p><b>Weight Class:</b> {{ fighter.weight_class }}</p>
  <p><b>Gym:</b> {{ fighter.gym }}</p>

  <p>{{ fighter.description }}</p>

  <a href="{{ url_for('onechampionship.index') }}" class="btn btn-secondary">
    Back
  </a>

</div>

{% endblock %}
